<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORTS·EDU | Q&A 게시판</title>
<style>
:root{--navy:#0f1c3f;--navy-2:#16244f;--card:#fff;--bg:#eef2f8;--mint:#12c2a0;--mint-2:#0aa588;--teal:#1f6feb;--accent:#7c5cff;--text:#1a2340;--muted:#6b7690;--line:#e3e9f2;--shadow:0 10px 30px rgba(15,28,63,.08);}
[data-theme="dark"]{--navy:#0a1330;--navy-2:#0f1b40;--card:#161f3d;--bg:#0b1226;--text:#e8ecf6;--muted:#9aa6c4;--line:#26304f;--shadow:0 10px 30px rgba(0,0,0,.35);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard','Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);transition:.3s;}button{cursor:pointer;border:none;font-family:inherit;}a{text-decoration:none;color:inherit;}
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;padding:0 24px;height:64px;gap:28px;position:sticky;top:0;z-index:20;}
.logo{font-size:20px;font-weight:800;letter-spacing:-1px;background:linear-gradient(90deg,var(--teal),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent;}
.logo span{font-weight:400;}
.nav{display:flex;gap:4px;margin-left:10px;flex:1;}
.nav button,.nav a{background:none;color:#c7cfe6;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:.15s;display:inline-block;}
.nav button:hover,.nav a:hover{background:rgba(255,255,255,.08);color:#fff;}.nav a.active{background:linear-gradient(90deg,var(--teal),var(--mint));color:#fff;}
.top-right{display:flex;align-items:center;gap:14px;}.icon-btn{background:rgba(255,255,255,.1);color:#fff;width:38px;height:38px;border-radius:10px;font-size:16px;}
.profile{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:20px;font-size:13px;color:#fff;}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--accent));}
main{padding:24px;max-width:1400px;margin:0 auto;width:100%;}
.hello{margin-bottom:20px;}.hello h1{font-size:24px;font-weight:800;letter-spacing:-.5px;}.hello p{color:var(--muted);font-size:14px;margin-top:4px;}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.search{flex:1;min-width:220px;position:relative;}
.search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:var(--card);color:var(--text);}
.search input:focus{outline:none;border-color:var(--mint);}
.search::before{content:"🔍";position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--card);border:1px solid var(--line);color:var(--muted);transition:.15s;}
.chip:hover{border-color:var(--mint);color:var(--mint-2);}
.chip.active{background:linear-gradient(90deg,var(--teal),var(--mint));color:#fff;border-color:transparent;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.course{background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;transition:.15s;cursor:pointer;}
.course:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(15,28,63,.14);}
.thumb{height:150px;background:linear-gradient(135deg,var(--navy),var(--mint-2));display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;}
.thumb .lvl{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.35);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;}
.thumb .dur{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;}
.course-body{padding:16px 18px 20px;}
.course-cat{font-size:11px;font-weight:700;color:var(--mint-2);letter-spacing:.3px;}
.course-title{font-size:16px;font-weight:700;margin:6px 0 6px;line-height:1.35;}
.course-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;min-height:38px;}
.course-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.course-meta .teacher{display:flex;align-items:center;gap:6px;}
.mini-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--accent));}
.progress{margin-top:12px;height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--mint));}
.progress-label{font-size:11px;color:var(--muted);margin-top:6px;}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,16,40,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:720px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.player{aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:12px;}
.play-btn{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.9);color:var(--navy);font-size:26px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:22px 24px 26px;}
.modal-body h2{font-size:20px;font-weight:800;margin-bottom:8px;}
.modal-body p{font-size:14px;color:var(--muted);line-height:1.6;}
.modal-close{position:absolute;top:18px;right:22px;background:rgba(255,255,255,.15);color:#fff;width:34px;height:34px;border-radius:10px;font-size:16px;z-index:60;}
.modal-wrap{position:relative;}
@media(max-width:1000px){.nav{display:none;}}

.qwrap{max-width:960px;margin:0 auto;padding:24px;}
.qhead{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
.qhead h1{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.qhead p{color:var(--muted);font-size:14px;margin-top:4px;}
.qbtn{background:linear-gradient(90deg,var(--teal),var(--mint));color:#fff;padding:10px 18px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.qbtn.secondary{background:rgba(127,127,127,.12);color:var(--text);}
.qtools{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.qtools input{flex:1;min-width:200px;background:var(--bg2);border:1px solid rgba(127,127,127,.25);color:var(--text);padding:10px 14px;border-radius:12px;font-size:14px;}
.qtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.qtab{background:rgba(127,127,127,.10);color:var(--muted);border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.qtab.active{background:var(--teal);color:#fff;}
.qlist{display:flex;flex-direction:column;gap:12px;}
.qcard{background:var(--card);border:1px solid rgba(127,127,127,.15);border-radius:16px;padding:16px 18px;transition:.15s;}
.qcard:hover{border-color:var(--teal);transform:translateY(-1px);}
.qcard .qtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:rgba(31,111,235,.12);color:var(--mint);margin-bottom:8px;}
.qcard .qtitle{font-size:16px;font-weight:700;margin-bottom:6px;}
.qcard .qbody{color:var(--muted);font-size:14px;line-height:1.6;white-space:pre-wrap;}
.qcard .qmeta{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-top:10px;}
.qanswer{margin-top:12px;padding:12px 14px;background:rgba(18,194,160,.08);border-left:3px solid var(--teal);border-radius:8px;font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;}
.qanswer b{color:var(--teal);}
.qempty{text-align:center;color:var(--muted);padding:48px 0;font-size:14px;}

  </style>
</head>
<body data-theme="light">
<header class="topbar"><div class="logo">SPORTS<span>·</span>EDU</div>
<nav class="nav"><a href="index.html">대시보드</a><a href="lecture.html">체육 강의</a><a href="staff.html">교직실무 강의</a><a href="tournament.html">대회 운영</a><a class="active">Q&A</a></nav>
<div class="top-right"><button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button><div class="profile"><div class="avatar"></div><span>선생님</span></div><a class="icon-btn" href="index.html" title="대시보드로">⎋</a></div></header>
  <main class="qwrap">
    <div class="qhead">
      <div>
        <h1>Q&A 게시판</h1>
        <p>체육 수업·교직실무·대회 운영에 관한 질문과 답변을 확인하세요.</p>
      </div>
      <div style="display:flex;gap:8px;">
        <a class="qbtn secondary" href="#" id="refreshBtn" onclick="loadQna();return false;">↻ 새로고침</a>
        <a class="qbtn" id="askBtn" href="#" target="_blank" rel="noopener">＋ 질문하기</a>
      </div>
    </div>
    <div class="qtools">
      <input type="text" id="qsearch" placeholder="질문 검색..." oninput="renderQna()">
    </div>
    <div class="qtabs" id="qtabs"></div>
    <div class="qlist" id="qlist">
      <div class="qempty">불러오는 중...</div>
    </div>
  </main>

  <script>
    // 테마 토글 (다른 페이지와 동일)
    function toggleTheme(){
      var b=document.body, cur=b.getAttribute('data-theme');
      var next=cur==='dark'?'light':'dark';
      b.setAttribute('data-theme',next);
      var btn=document.getElementById('themeBtn'); if(btn) btn.textContent= next==='dark'?'☀️':'🌙';
      try{localStorage.setItem('sportedu_theme',next);}catch(e){}
    }
    (function(){try{var s=localStorage.getItem('sportedu_theme'); if(s){document.body.setAttribute('data-theme',s); var b=document.getElementById('themeBtn'); if(b)b.textContent= s==='dark'?'☀️':'🌙';}}catch(e){}})();

    // ===== Q&A 설정 =====
    // Google 설문지(질문 접수용) 링크와 Google Sheets(답변 목록) CSV 게시 URL을 나중에 입력하세요.
    var QNA_FORM_URL = "";      // 예: https://docs.google.com/forms/d/e/.../viewform
    var QNA_CSV_URL  = "";      // 예: https://docs.google.com/spreadsheets/d/e/.../pub?output=csv
    // 시트 열 형식: category | title | question | answer | author | date

    var QNA_DATA = [];
    var QNA_FILTER = "전체";

    // 데모 데이터 (CSV URL이 없을 때 표시)
    var DEMO = [
      {category:"체육 수업", title:"우천 시 실내 수업 아이디어가 궁금해요", question:"비 오는 날 강당을 못 쓸 때 교실에서 할 수 있는 체육 활동이 있을까요?", answer:"교실 스트레칭, 표적 던지기(종이공), 협동 미션 게임 등을 추천합니다. 자료실의 '실내 체육' 카테고리를 참고하세요.", author:"김체육", date:"2026-03-04"},
      {category:"교직실무", title:"NEIS 체육 평가 입력 순서", question:"수행평가 결과를 NEIS에 입력하는 순서가 헷갈립니다.", answer:"성적 > 지필/수행 > 과목 선택 후 학생별 입력 → 마감 처리 순서입니다. 교직실무 강의의 '평가기록' 편을 확인해 주세요.", author:"이교무", date:"2026-03-02"},
      {category:"대회 운영", title:"리그전 대진표 자동 생성 방법", question:"6개 팀 리그전 대진표를 쉽게 만들 수 있나요?", answer:"대회 운영 페이지에서 팀 수를 입력하면 라운드로빈 대진표가 자동 생성됩니다. (운영자 전용 기능)", author:"박운영", date:"2026-02-27"}
    ];

    function parseCSV(text){
      var rows=[], row=[], cur='', q=false;
      for(var i=0;i<text.length;i++){
        var c=text[i];
        if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
        else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c==='\r'){} else cur+=c; }
      }
      if(cur.length||row.length){row.push(cur);rows.push(row);}
      return rows;
    }

    async function loadQna(){
      var list=document.getElementById('qlist');
      if(!QNA_CSV_URL){ QNA_DATA=DEMO.slice(); buildTabs(); renderQna(); return; }
      list.innerHTML='<div class="qempty">불러오는 중...</div>';
      try{
        var res=await fetch(QNA_CSV_URL);
        var txt=await res.text();
        var rows=parseCSV(txt).filter(function(r){return r.some(function(c){return (c||'').trim();});});
        if(rows.length<2){ QNA_DATA=[]; buildTabs(); renderQna(); return; }
        var head=rows[0].map(function(h){return (h||'').trim();});
        var idx=function(n){return head.indexOf(n);};
        QNA_DATA=rows.slice(1).map(function(r){
          return {
            category:(r[idx('category')]||'기타').trim(),
            title:(r[idx('title')]||'').trim(),
            question:(r[idx('question')]||'').trim(),
            answer:(r[idx('answer')]||'').trim(),
            author:(r[idx('author')]||'').trim(),
            date:(r[idx('date')]||'').trim()
          };
        }).filter(function(x){return x.title;});
        buildTabs(); renderQna();
      }catch(e){
        list.innerHTML='<div class="qempty">데이터를 불러오지 못했습니다. CSV 게시 URL을 확인해 주세요.</div>';
      }
    }

    function buildTabs(){
      var cats=['전체']; QNA_DATA.forEach(function(d){ if(cats.indexOf(d.category)<0)cats.push(d.category); });
      var wrap=document.getElementById('qtabs');
      wrap.innerHTML=cats.map(function(c){return '<button class="qtab'+(c===QNA_FILTER?' active':'')+'" onclick="setQnaFilter(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</button>';}).join('');
    }
    function setQnaFilter(c){ QNA_FILTER=c; buildTabs(); renderQna(); }

    function renderQna(){
      var kw=(document.getElementById('qsearch').value||'').trim().toLowerCase();
      var list=document.getElementById('qlist');
      var items=QNA_DATA.filter(function(d){
        var okCat = QNA_FILTER==='전체' || d.category===QNA_FILTER;
        var hay=(d.title+' '+d.question+' '+d.answer).toLowerCase();
        return okCat && (!kw || hay.indexOf(kw)>=0);
      });
      if(!items.length){ list.innerHTML='<div class="qempty">표시할 질문이 없습니다.</div>'; return; }
      list.innerHTML=items.map(function(d){
        return '<div class="qcard">'
          +'<span class="qtag">'+esc(d.category)+'</span>'
          +'<div class="qtitle">'+esc(d.title)+'</div>'
          +(d.question?'<div class="qbody">'+esc(d.question)+'</div>':'')
          +(d.answer?'<div class="qanswer"><b>답변</b> '+esc(d.answer)+'</div>':'')
          +'<div class="qmeta">'+(d.author?'<span>👤 '+esc(d.author)+'</span>':'')+(d.date?'<span>🗓 '+esc(d.date)+'</span>':'')+'</div>'
          +'</div>';
      }).join('');
    }
    function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    // 질문하기 버튼 링크 설정
    (function(){
      var ask=document.getElementById('askBtn');
      if(QNA_FORM_URL){ ask.href=QNA_FORM_URL; }
      else { ask.href='#'; ask.onclick=function(){alert('질문 접수용 Google 설문지 링크가 아직 설정되지 않았습니다.');return false;}; ask.removeAttribute('target'); }
    })();

    loadQna();
  </script>
</body>
</html>
